<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chaser — Pitcher Development</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#07101E;--panel:#0E1929;--card:#182338;--border:#223050;
  --teal:#00C896;--teal-dim:#00785A;--red:#FF4D4D;--red-dim:#8B1A1A;
  --blue:#4A9EFF;--amber:#FFAA33;--purple:#A78BFA;--green:#4ADE80;
  --orange:#FF7A3D;--text:#EEF2FF;--muted:#6B80A8;--dim:#2E3F5C;
}
html,body{height:100%;background:var(--navy);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;font-size:13px;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

/* HEADER */
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.menu-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:4px}
.menu-btn span{display:block;width:20px;height:2px;background:var(--text);border-radius:1px}
.hdr-logo{font-size:18px;font-weight:800;letter-spacing:1px;color:var(--teal)}
.hdr-logo em{color:var(--text);font-style:normal}
.hdr-right{display:flex;gap:8px;align-items:center}
.ai-btn{background:rgba(0,200,150,.1);border:1px solid var(--teal);color:var(--teal);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.5px}

/* DROPDOWN MENU */
.menu-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5)}
.menu-drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--panel);border-right:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .25s ease}
.menu-drawer.open{transform:translateX(0)}
.menu-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.menu-logo-text{font-size:20px;font-weight:800;letter-spacing:1px;color:var(--teal)}
.menu-logo-sub{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.menu-items{flex:1;overflow-y:auto;padding:8px 0}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}
.menu-item:hover{background:rgba(255,255,255,.04)}
.menu-item.active{background:rgba(0,200,150,.08);border-left-color:var(--teal)}
.menu-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.menu-label{font-size:13px;font-weight:700}
.menu-sub{font-size:10px;color:var(--muted);margin-top:1px}
.menu-divider{height:1px;background:var(--border);margin:6px 16px}

/* PITCHER BAR */
.pitcher-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.pitcher-select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600;flex:1;outline:none;appearance:none;cursor:pointer}
.btn-sm{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:600}
.btn-teal{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}

/* COUNT BAR */
.count-bar{background:var(--navy);display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.count-seg{flex:1;padding:7px 4px;text-align:center;border-right:1px solid var(--border)}
.count-seg:last-child{border-right:none}
.count-lbl{font-size:8px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.count-val{font-size:20px;font-weight:700;font-family:'SF Mono','Fira Mono',monospace;line-height:1.1}
.cv-b{color:var(--blue)}.cv-s{color:var(--red)}.cv-p{color:var(--teal)}.cv-v{color:var(--amber)}

/* TABS */
.tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;letter-spacing:.3px;border-bottom:2px solid transparent}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ZONE */
.zone-wrap{padding:10px 12px 4px;display:flex;flex-direction:column;align-items:center}
#zoneCanvas,#gameZoneCanvas{border-radius:10px;cursor:crosshair;touch-action:none;display:block;width:100%;max-width:340px}

/* CONTROLS */
.pitch-ctrl{padding:6px 12px 4px;display:flex;flex-direction:column;gap:7px}
.ctrl-row{display:flex;gap:8px;align-items:center}
.ctrl-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;min-width:38px}
.pitch-type-grid{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.pt-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 8px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
.vel-inp{background:var(--card);border:1px solid var(--border);color:var(--teal);border-radius:8px;padding:6px 10px;font-size:16px;font-weight:700;font-family:'SF Mono','Fira Mono',monospace;width:76px;outline:none;text-align:center}
.vel-unit{color:var(--muted);font-size:11px;font-weight:700}

.end-session-row{padding:5px 12px 8px}
.btn-end-session{width:100%;padding:10px;border-radius:10px;background:rgba(0,200,150,.08);border:1px solid var(--teal);color:var(--teal);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.4px}

/* ACTION ROW */
.action-row{display:flex;gap:6px;padding:6px 12px;flex-shrink:0}
.action-row button{flex:1;padding:9px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;letter-spacing:.3px}
.btn-undo{background:rgba(255,170,51,.1);border-color:var(--amber);color:var(--amber)}
.btn-clear{background:rgba(255,77,77,.08);border-color:var(--red);color:var(--red)}
.btn-export{background:rgba(123,141,176,.08);border-color:var(--muted);color:var(--muted)}

/* HEAT */
.heat-section{padding:10px 12px}
.heat-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.hf-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer}
.hf-btn.active{border-color:var(--teal);color:var(--teal);background:rgba(0,200,150,.08)}
#heatCanvas{border-radius:10px;display:block;width:100%;max-width:340px;margin:0 auto}
.legend-grad{width:90px;height:7px;border-radius:3px;background:linear-gradient(to right,rgba(74,158,255,.2),rgba(255,77,77,.9))}
.legend-lbl{font-size:10px;color:var(--muted);font-weight:700}

/* STATS */
.stats-section{padding:10px 12px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.stat-lbl{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:2px}
.stat-val{font-size:20px;font-weight:700;font-family:'SF Mono','Fira Mono',monospace}
.stat-sub{font-size:10px;color:var(--muted);margin-top:1px}
.pitch-breakdown{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 11px;margin-bottom:7px}
.pb-title{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
.pb-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.pb-name{font-size:10px;font-weight:700;min-width:55px}
.pb-bar-wrap{flex:1;height:5px;background:var(--navy);border-radius:3px;overflow:hidden}
.pb-bar{height:100%;border-radius:3px}
.pb-stats{font-size:9px;color:var(--muted);font-family:'SF Mono','Fira Mono',monospace;min-width:68px;text-align:right}
.pitch-log{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.pl-header{display:flex;padding:6px 12px;background:var(--panel);border-bottom:1px solid var(--border);font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.pl-row{display:flex;padding:5px 12px;border-bottom:1px solid var(--border);align-items:center;font-size:10px}
.pl-row:last-child{border-bottom:none}
.pl-num{min-width:26px;color:var(--muted);font-weight:700;font-family:'SF Mono','Fira Mono',monospace}
.pl-type{min-width:52px;font-weight:700}
.pl-loc{min-width:44px;color:var(--muted);font-family:'SF Mono','Fira Mono',monospace;font-size:9px}
.pl-vel{min-width:42px;color:var(--amber);font-weight:700;font-family:'SF Mono','Fira Mono',monospace}
.pl-result{flex:1;text-align:right}
.badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;letter-spacing:.5px}
.badge-str{background:rgba(255,77,77,.15);color:var(--red)}
.badge-bal{background:rgba(74,158,255,.15);color:var(--blue)}
.badge-swm{background:rgba(167,139,250,.15);color:var(--purple)}
.badge-foul{background:rgba(255,170,51,.15);color:var(--amber)}
.badge-k{background:rgba(255,77,77,.2);color:var(--red)}
.badge-bb{background:rgba(74,158,255,.2);color:var(--blue)}

/* ROSTER */
.roster-section{padding:12px}
.roster-add{display:flex;gap:8px;margin-bottom:12px}
.roster-inp{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;flex:1;outline:none}
.roster-inp:focus{border-color:var(--teal)}
.roster-inp::placeholder{color:var(--dim)}
.roster-list{display:flex;flex-direction:column;gap:6px}
.roster-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.roster-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.roster-info{flex:1}
.roster-name{font-size:14px;font-weight:700}
.roster-meta{font-size:10px;color:var(--muted);margin-top:1px}
.roster-del{background:none;border:none;color:var(--red);cursor:pointer;padding:4px;font-size:18px;line-height:1}
.roster-item.active-p{border-color:var(--teal);background:rgba(0,200,150,.05)}
.session-history{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px}
.sh-header{padding:7px 12px;background:var(--panel);border-bottom:1px solid var(--border);font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.sh-item{padding:9px 12px;border-bottom:1px solid var(--border)}
.sh-item:last-child{border-bottom:none}
.sh-date{font-size:10px;font-weight:700;color:var(--teal);margin-bottom:2px}
.sh-stats{font-size:10px;color:var(--muted);margin-bottom:3px;font-family:'SF Mono','Fira Mono',monospace}
.sh-note{font-size:11px;color:var(--text);font-style:italic;opacity:.8}

/* CONTENT PAGES (arm care, strength, throwing, gameday) */
.content-page{padding:12px}
.content-hero{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;text-align:center}
.content-hero-title{font-size:17px;font-weight:800;letter-spacing:.5px;margin-bottom:4px}
.content-hero-sub{font-size:11px;color:var(--muted);line-height:1.5}
.section-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;margin-top:12px}
.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.exercise-header{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.exercise-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exercise-info{flex:1}
.exercise-name{font-size:13px;font-weight:700}
.exercise-meta{font-size:10px;color:var(--muted);margin-top:1px}
.exercise-chevron{color:var(--muted);font-size:16px;transition:transform .2s}
.exercise-chevron.open{transform:rotate(180deg)}
.exercise-body{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.exercise-body.open{display:block}
.exercise-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-top:10px;margin-bottom:10px}
.video-btn{display:flex;align-items:center;gap:8px;background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.3);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--blue);font-size:11px;font-weight:700;text-decoration:none;width:100%}
.video-btn-icon{width:28px;height:28px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* STRENGTH SUBMENU */
.strength-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.strength-cat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center;cursor:pointer}
.strength-cat:hover{border-color:var(--teal);background:rgba(0,200,150,.05)}
.strength-cat-icon{font-size:24px;margin-bottom:6px}
.strength-cat-name{font-size:12px;font-weight:700}
.strength-cat-sub{font-size:10px;color:var(--muted);margin-top:2px}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;padding:0;margin-bottom:12px}

/* THROWING PROGRAM */
.week-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.week-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.week-badge{background:var(--teal-dim);color:var(--teal);font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.5px;white-space:nowrap}
.week-title{font-size:13px;font-weight:700;flex:1}
.week-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
.week-body.open{display:block}
.day-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.day-label{font-size:9px;font-weight:700;color:var(--teal);min-width:30px;padding-top:1px}
.day-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* GAMEDAY */
.phase-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.phase-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.phase-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.phase-title{font-size:13px;font-weight:700;flex:1}
.phase-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
.phase-body.open{display:block}
.routine-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--teal-dim);color:var(--teal);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
.step-title{font-weight:700;color:var(--text);display:block;margin-bottom:1px}

/* POPUPS */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.popup-sheet{background:var(--panel);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:18px 16px 30px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.popup-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;width:calc(100% - 40px);max-width:320px;margin:auto;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:102}
.popup-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.popup-title{font-size:17px;font-weight:700;margin-bottom:4px}
.popup-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.popup-inp{background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;font-size:14px;width:100%;outline:none;margin-bottom:10px}
.popup-inp:focus{border-color:var(--teal)}
.popup-btns{display:flex;gap:8px;margin-top:4px}
.popup-btns button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid}

/* END SESSION SHEET */
.es-hero{text-align:center;padding:6px 0 14px}
.es-count{font-size:50px;font-weight:700;font-family:'SF Mono','Fira Mono',monospace;color:var(--teal);line-height:1}
.es-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.es-quick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.es-stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 5px;text-align:center}
.es-stat-val{font-size:17px;font-weight:700;font-family:'SF Mono','Fira Mono',monospace}
.es-stat-lbl{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.es-expand-btn{width:100%;padding:9px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:11px}
.es-full-stats{display:none;margin-bottom:11px}
.es-full-stats.open{display:block}
.es-note-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.es-note-inp{background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:13px;width:100%;outline:none;resize:none;font-family:inherit;line-height:1.5;min-height:75px}
.es-note-inp:focus{border-color:var(--teal)}
.es-note-inp::placeholder{color:var(--dim)}
.es-done-btn{width:100%;padding:11px;border-radius:10px;background:var(--teal-dim);border:1px solid var(--teal);color:var(--teal);font-size:14px;font-weight:700;cursor:pointer;margin-top:11px}

/* OUTCOME PICKER */
.outcome-picker{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--panel);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:14px 14px 22px;z-index:50}
.op-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;text-align:center}
.op-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.op-btn{padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid;text-align:center;letter-spacing:.3px}
.op-cancel{margin-top:7px;width:100%;padding:9px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}

/* AI CHAT */
.ai-page{display:flex;flex-direction:column;height:100%}
.ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.55}
.ai-msg.user{background:var(--teal-dim);color:var(--text);align-self:flex-end;border-bottom-right-radius:3px}
.ai-msg.ai{background:var(--card);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
.ai-msg.thinking{color:var(--muted);font-style:italic}
.ai-input-row{padding:10px 12px;background:var(--panel);border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.ai-inp{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:9px 14px;font-size:13px;outline:none;font-family:inherit}
.ai-inp:focus{border-color:var(--teal)}
.ai-inp::placeholder{color:var(--muted)}
.ai-send{background:var(--teal-dim);border:1px solid var(--teal);color:var(--teal);border-radius:20px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 15px;font-size:12px;font-weight:700;z-index:300;pointer-events:none;white-space:nowrap}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;gap:8px;color:var(--muted);text-align:center}
.empty-icon{font-size:38px;margin-bottom:4px}
.empty-title{font-size:15px;font-weight:700;color:var(--text)}
.empty-sub{font-size:12px;line-height:1.5}

/* PAGE WRAPPER for non-bullpen pages */
.full-page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
.full-page::-webkit-scrollbar{width:3px}
.full-page::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.page-hero{background:linear-gradient(135deg,var(--panel) 0%,var(--card) 100%);border-bottom:1px solid var(--border);padding:16px 14px 14px;flex-shrink:0}
.page-hero-label{font-size:9px;font-weight:700;color:var(--teal);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
.page-hero-title{font-size:20px;font-weight:800;letter-spacing:.3px;margin-bottom:4px}
.page-hero-sub{font-size:11px;color:var(--muted);line-height:1.5}

function save(){
  localStorage.setItem('bp_pitchers',JSON.stringify(state.pitchers));
  localStorage.setItem('bp_sessions',JSON.stringify(state.sessions));
  localStorage.setItem('bp_game_sessions',JSON.stringify(state.gameSessions));
}
function getSession(pid){
  if(!state.sessions[pid])state.sessions[pid]={allTime:[],sessions:[]};
  return state.sessions[pid];
}
function getCurrentSession(pid){
  const s=getSession(pid);
  if(!s.sessions.length)s.sessions.push({date:new Date().toLocaleDateString(),pitches:[],note:''});
  return s.sessions[s.sessions.length-1];
}
function getGameSession(pid){
  if(!state.gameSessions[pid])state.gameSessions[pid]=[];
  return state.gameSessions[pid];
}
function getCurrentGameSession(pid){
  const s=getGameSession(pid);
  if(!s.length)s.push({date:new Date().toLocaleDateString(),pitches:[],note:'',inning:1});
  return s[s.length-1];
}
function showToast(msg,color='var(--teal)'){
  clearTimeout(state.toastTimer);
  state.toast={msg,color};render();
  state.toastTimer=setTimeout(()=>{state.toast=null;render();},2200);
}

const ZONE_W=340,ZONE_H=380,ZX=60,ZY=70,ZW=220,ZH=240;

function drawZoneCanvas(canvas,pitches,highlightLast,compact){
  if(!canvas)return;
  const H=compact?380:380;
  const dpr=window.devicePixelRatio||1;
  canvas.width=ZONE_W*dpr;canvas.height=H*dpr;
  canvas.style.width=ZONE_W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#080E1C';ctx.beginPath();ctx.roundRect(0,0,ZONE_W,H,10);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.03)';
  ctx.beginPath();ctx.arc(ZONE_W-28,ZY+25,12,0,Math.PI*2);ctx.fill();
  ctx.fillRect(ZONE_W-32,ZY+37,10,50);
  ctx.shadowColor='#00C896';ctx.shadowBlur=10;
  ctx.strokeStyle='rgba(0,200,150,.7)';ctx.lineWidth=2;
  ctx.strokeRect(ZX,ZY,ZW,ZH);ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,200,150,.22)';ctx.lineWidth=1;
  const cw=ZW/3,ch=ZH/3;
  for(let i=1;i<3;i++){
    ctx.beginPath();ctx.moveTo(ZX+i*cw,ZY);ctx.lineTo(ZX+i*cw,ZY+ZH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ZX,ZY+i*ch);ctx.lineTo(ZX+ZW,ZY+i*ch);ctx.stroke();
  }
  const labels=[['1','2','3'],['4','5','6'],['7','8','9']];
  ctx.font='9px SF Mono,monospace';ctx.fillStyle='rgba(123,141,176,.28)';
  for(let r=0;r<3;r++)for(let c=0;c<3;c++)ctx.fillText(labels[r][c],ZX+c*cw+4,ZY+r*ch+11);
  ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(123,141,176,.1)';
  ctx.strokeRect(ZX-35,ZY-35,ZW+70,ZH+70);ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,.07)';
  const px=ZX+ZW/2,py=ZY+ZH+44;
  ctx.beginPath();ctx.moveTo(px-20,py-10);ctx.lineTo(px+20,py-10);ctx.lineTo(px+20,py+2);
  ctx.lineTo(px,py+14);ctx.lineTo(px-20,py+2);ctx.closePath();ctx.fill();
  if(pitches)pitches.forEach((p,i)=>{
    const isLast=highlightLast&&i===pitches.length-1;
    const pt=PITCH_TYPES.find(t=>t.code===p.type)||PITCH_TYPES[0];
    if(!isLast)ctx.globalAlpha=0.5;
    ctx.shadowColor=pt.color;ctx.shadowBlur=isLast?8:3;
    ctx.beginPath();ctx.arc(p.x,p.y,isLast?8:6,0,Math.PI*2);ctx.fillStyle=pt.color;ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,isLast?3.5:2.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    if(isLast){ctx.font='bold 9px SF Mono,monospace';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(p.type,p.x,p.y-12);ctx.textAlign='left';}
  });
  if(pitches&&pitches.length)pitches.forEach((p,i)=>{
    ctx.font='6px SF Mono,monospace';ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.textAlign='center';ctx.fillText(i+1,p.x,p.y+2.5);ctx.textAlign='left';
  });
}

function drawHeatCanvas(canvas,pitches){
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  canvas.width=ZONE_W*dpr;canvas.height=380*dpr;
  canvas.style.width=ZONE_W+'px';canvas.style.height='380px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#050C17';ctx.beginPath();ctx.roundRect(0,0,ZONE_W,380,10);ctx.fill();
  if(pitches&&pitches.length)pitches.forEach(p=>{
    const pt=PITCH_TYPES.find(t=>t.code===p.type)||PITCH_TYPES[0];
    const grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,30);
    grd.addColorStop(0,pt.color+'BB');grd.addColorStop(0.4,pt.color+'44');grd.addColorStop(1,pt.color+'00');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(p.x,p.y,30,0,Math.PI*2);ctx.fill();
  });
  ctx.strokeStyle='rgba(0,200,150,.5)';ctx.lineWidth=1.5;ctx.strokeRect(ZX,ZY,ZW,ZH);
  ctx.strokeStyle='rgba(0,200,150,.16)';ctx.lineWidth=.7;
  const cw=ZW/3,ch=ZH/3;
  for(let i=1;i<3;i++){
    ctx.beginPath();ctx.moveTo(ZX+i*cw,ZY);ctx.lineTo(ZX+i*cw,ZY+ZH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ZX,ZY+i*ch);ctx.lineTo(ZX+ZW,ZY+i*ch);ctx.stroke();
  }
}

function handleZoneClick(e,isGame){
  const pid=isGame?state.activeGamePitcher:state.activePitcher;
  if(!pid){showToast('Select a pitcher first');return;}
  const id=isGame?'gameZoneCanvas':'zoneCanvas';
  const canvas=document.getElementById(id);
  if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  const scaleX=ZONE_W/rect.width,scaleY=380/rect.height;
  const ex=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const ey=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  const pitch={x:ex*scaleX,y:ey*scaleY,type:isGame?state.gamePitchType||'FB':state.pitchType,vel:state.velocity,ts:Date.now()};
  if(isGame)state.pendingGamePitch=pitch;
  else state.pendingPitch=pitch;
  render();
}

function confirmOutcome(outcome){
  if(!state.pendingPitch)return;
  const p=state.pendingPitch;
  const inZone=p.x>=ZX&&p.x<=ZX+ZW&&p.y>=ZY&&p.y<=ZY+ZH;
  let isStrike=false;
  if(outcome==='strike')isStrike=true;
  else if(outcome==='swm'){isStrike=true;p.swingMiss=true;}
  else if(outcome==='foul'){isStrike=state.strikes<2;p.foul=true;}
  p.result=outcome;p.inZone=inZone;p.isStrike=isStrike;
  const sess=getCurrentSession(state.activePitcher);
  const allTime=getSession(state.activePitcher);
  sess.pitches.push(p);allTime.allTime.push(p);
  state.sessions[state.activePitcher]=allTime;save();
  if(isStrike)state.strikes++;
  else if(outcome!=='foul')state.balls++;
  state.pitches++;
  let msg=null;
  if(state.strikes>=3){msg='STRIKEOUT!';state.strikes=0;state.balls=0;}
  else if(state.balls>=4){msg='WALK!';state.strikes=0;state.balls=0;}
  state.pendingPitch=null;
  if(msg)showToast(msg,'#00C896');
  render();
  setTimeout(()=>{const zc=document.getElementById('zoneCanvas');if(zc)drawZoneCanvas(zc,getCurrentSession(state.activePitcher).pitches,true);},50);
}

function confirmGameOutcome(outcome){
  if(!state.pendingGamePitch)return;
  const p=state.pendingGamePitch;
  const inZone=p.x>=ZX&&p.x<=ZX+ZW&&p.y>=ZY&&p.y<=ZY+ZH;
  let isStrike=false;
  if(outcome==='strike')isStrike=true;
  else if(outcome==='swm'){isStrike=true;p.swingMiss=true;}
  else if(outcome==='foul'){isStrike=state.gameStrikes<2;p.foul=true;}
  const isFirstPitch=state.gamePitches%3===0;
  p.result=outcome;p.inZone=inZone;p.isStrike=isStrike;p.isFirstPitch=isFirstPitch;
  if(isFirstPitch){state.gameFPSAttempts++;if(isStrike)state.gameFPS++;}
  const gs=getCurrentGameSession(state.activeGamePitcher);
  gs.pitches.push(p);save();
  if(isStrike)state.gameStrikes++;
  else if(outcome!=='foul')state.gameBalls++;
  state.gamePitches++;
  let msg=null;
  if(state.gameStrikes>=3){msg='K!';state.gameStrikeouts++;state.gameStrikes=0;state.gameBalls=0;state.gameOuts++;}
  else if(state.gameBalls>=4){msg='BB!';state.gameWalks++;state.gameStrikes=0;state.gameBalls=0;}
  if(state.gameOuts>=3){state.gameOuts=0;state.gameInning++;msg=(msg||'')+'INNING OVER';}
  state.pendingGamePitch=null;
  if(msg)showToast(msg,'#00C896');
  render();
  setTimeout(()=>{const zc=document.getElementById('gameZoneCanvas');if(zc)drawZoneCanvas(zc,getCurrentGameSession(state.activeGamePitcher).pitches,true);},50);
}

function undoPitch(){
  if(!state.activePitcher)return;
  const sess=getCurrentSession(state.activePitcher);
  const allTime=getSession(state.activePitcher);
  if(!sess.pitches.length)return;
  const last=sess.pitches.pop();allTime.allTime.pop();
  if(last.isStrike&&!last.foul)state.strikes=Math.max(0,state.strikes-1);
  else if(!last.isStrike&&!last.foul)state.balls=Math.max(0,state.balls-1);
  state.pitches=Math.max(0,state.pitches-1);
  save();showToast('Pitch removed');render();
  setTimeout(()=>{const zc=document.getElementById('zoneCanvas');if(zc)drawZoneCanvas(zc,getCurrentSession(state.activePitcher).pitches,true);},50);
}
function clearPitches(){
  if(!state.activePitcher)return;
  if(!confirm('Clear all pitches for this session?'))return;
  const s=getSession(state.activePitcher);
  if(s.sessions.length)s.sessions[s.sessions.length-1].pitches=[];
  s.allTime=s.sessions.flatMap(ss=>ss.pitches);
  state.balls=0;state.strikes=0;state.pitches=0;
  save();showToast('Cleared');render();
  setTimeout(()=>{const zc=document.getElementById('zoneCanvas');if(zc)drawZoneCanvas(zc,[],false);},50);
}
function endSession(){
  if(!state.activePitcher)return;
  const sess=getCurrentSession(state.activePitcher);
  if(!sess.pitches.length){showToast('No pitches this session');return;}
  state.showEndSession=true;state.endSessionNote='';state.endSessionExpanded=false;render();
}
function finalizeEndSession(){
  const noteEl=document.getElementById('esNoteInp');
  const note=noteEl?noteEl.value.trim():'';
  const s=getSession(state.activePitcher);
  if(s.sessions.length)s.sessions[s.sessions.length-1].note=note;
  s.sessions.push({date:new Date().toLocaleDateString(),pitches:[],note:''});
  state.balls=0;state.strikes=0;state.pitches=0;
  state.showEndSession=false;state.endSessionNote='';
  save();showToast('Session saved');render();
  setTimeout(()=>{const zc=document.getElementById('zoneCanvas');if(zc)drawZoneCanvas(zc,[],false);},50);
}
function exportCSV(){
  let csv='Pitcher,Date,#,Type,Velocity,X,Y,InZone,Result\n';
  for(const pid in state.sessions){
    state.sessions[pid].sessions.forEach(sess=>{
      sess.pitches.forEach((p,i)=>{
        csv+=`${pid},${sess.date},${i+1},${p.type},${p.vel||''},${p.x.toFixed(1)},${p.y.toFixed(1)},${p.inZone},${p.result}\n`;
      });
    });
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='chaser_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function calcStats(pitches){
  if(!pitches||!pitches.length)return null;
  const total=pitches.length;
  const strikes=pitches.filter(p=>p.isStrike).length;
  const balls=pitches.filter(p=>!p.isStrike&&!p.foul).length;
  const inZone=pitches.filter(p=>p.inZone).length;
  const swm=pitches.filter(p=>p.swingMiss).length;
  const vels=pitches.filter(p=>p.vel&&!isNaN(p.vel)).map(p=>parseFloat(p.vel));
  const avgVel=vels.length?(vels.reduce((a,b)=>a+b,0)/vels.length).toFixed(1):'--';
  const maxVel=vels.length?Math.max(...vels):'--';
  const byType={};
  PITCH_TYPES.forEach(pt=>{
    const pts=pitches.filter(p=>p.type===pt.code);
    if(pts.length){
      const pv=pts.filter(p=>p.vel&&!isNaN(p.vel)).map(p=>parseFloat(p.vel));
      byType[pt.code]={count:pts.length,pct:((pts.length/total)*100).toFixed(0),
        strikes:pts.filter(p=>p.isStrike).length,
        avgVel:pv.length?(pv.reduce((a,b)=>a+b,0)/pv.length).toFixed(1):'--',
        name:pt.name,color:pt.color};
    }
  });
  return{total,strikes,balls,inZone,swm,
    strikePct:((strikes/total)*100).toFixed(1),
    zonePct:((inZone/total)*100).toFixed(1),
    swmPct:((swm/total)*100).toFixed(1),
    avgVel,maxVel,byType};
}
function getZoneNum(x,y){
  if(x<ZX||x>ZX+ZW||y<ZY||y>ZY+ZH)return '--';
  return Math.floor((y-ZY)/(ZH/3))*3+Math.floor((x-ZX)/(ZW/3))+1;
}

async function sendAIMessage(msg){
  if(!msg.trim())return;
  state.aiMessages.push({role:'user',text:msg});
  state.aiLoading=true;render();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:'You are an expert MLB-level pitching coach assistant inside an app called Chaser, designed for high school baseball pitchers. Answer questions about pitching mechanics, arm care, strength training, pitch selection, mental approach, game preparation, and recovery. Be specific, practical, and concise. Use baseball terminology correctly. Responses should be helpful for a high school pitcher trying to improve.',
        messages:state.aiMessages.filter(m=>m.role!=='thinking').map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}))
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'Sorry, I had trouble with that. Try again!';
    state.aiMessages.push({role:'ai',text});
  }catch(e){
    state.aiMessages.push({role:'ai',text:'Connection error. Make sure you have internet access and try again.'});
  }
  state.aiLoading=false;render();
  setTimeout(()=>{const el=document.getElementById('aiMessages');if(el)el.scrollTop=el.scrollHeight;},50);
}

        if(zc)drawZoneCanvas(zc,state.activePitcher?getCurrentSession(state.activePitcher).pitches:[],true);
      }
      if(state.activeTab==='heat'){
        const hc=document.getElementById('heatCanvas');
        if(hc){
          let p=[];
          if(state.activePitcher){
            const s=getSession(state.activePitcher);
            p=state.heatFilter==='session'?getCurrentSession(state.activePitcher).pitches:s.allTime;
            if(state.heatPitchType!=='ALL')p=p.filter(x=>x.type===state.heatPitchType);
          }

}

function buildStatsTab(ap,pitches,stats){
  if(!ap||!stats||!pitches.length)return`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No Data Yet</div><div class="empty-sub">Throw some pitches in the Zone tab to see stats here.</div></div>`;
  const allStats=calcStats(getSession(ap).allTime);
  const pastSessions=getSession(ap).sessions.slice(0,-1).reverse().slice(0,5);
  return`
    <div class="stats-section">
      <div style="font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px">THIS SESSION</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-lbl">PITCHES</div><div class="stat-val" style="color:var(--teal)">${stats.total}</div><div class="stat-sub">${stats.strikes}K / ${stats.balls}BB</div></div>
        <div class="stat-card"><div class="stat-lbl">STRIKE %</div><div class="stat-val" style="color:${parseFloat(stats.strikePct)>=65?'var(--green)':parseFloat(stats.strikePct)>=55?'var(--amber)':'var(--red)'}">${stats.strikePct}%</div><div class="stat-sub">MLB avg ~65%</div></div>
        <div class="stat-card"><div class="stat-lbl">ZONE %</div><div class="stat-val" style="color:var(--blue)">${stats.zonePct}%</div><div class="stat-sub">${stats.inZone} in zone</div></div>
        <div class="stat-card"><div class="stat-lbl">SWM %</div><div class="stat-val" style="color:var(--purple)">${stats.swmPct}%</div><div class="stat-sub">Swing & miss</div></div>
        <div class="stat-card"><div class="stat-lbl">AVG VELO</div><div class="stat-val" style="color:var(--amber)">${stats.avgVel}</div><div class="stat-sub">MPH</div></div>
        <div class="stat-card"><div class="stat-lbl">MAX VELO</div><div class="stat-val" style="color:var(--amber)">${stats.maxVel}</div><div class="stat-sub">MPH top</div></div>
      </div>
      <div class="pitch-breakdown">
        <div class="pb-title">PITCH MIX</div>
        ${Object.entries(stats.byType).map(([code,d])=>`
          <div class="pb-row">
            <div class="pb-name" style="color:${d.color}">${d.name}</div>
            <div class="pb-bar-wrap"><div class="pb-bar" style="width:${d.pct}%;background:${d.color}88"></div></div>
            <div class="pb-stats">${d.pct}% · ${d.avgVel}mph</div>
          </div>`).join('')}
      </div>
      ${allStats&&getSession(ap).allTime.length>pitches.length?`
        <div style="font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;margin-top:3px">ALL TIME — ${getSession(ap).allTime.length} pitches</div>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-lbl">STRIKE %</div><div class="stat-val" style="color:var(--teal)">${allStats.strikePct}%</div></div>
          <div class="stat-card"><div class="stat-lbl">AVG VELO</div><div class="stat-val" style="color:var(--amber)">${allStats.avgVel}</div><div class="stat-sub">MPH all-time</div></div>
        </div>`:''}
      ${pastSessions.length?`
        <div style="font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;margin-top:3px">PAST SESSIONS</div>
        <div class="session-history">
          <div class="sh-header">DATE · PITCHES · STRIKE % · NOTES</div>
          ${pastSessions.map(s=>{const st=calcStats(s.pitches);return`<div class="sh-item"><div class="sh-date">${s.date}</div><div class="sh-stats">${st?`${st.total} pitches · ${st.strikePct}% strikes · ${st.avgVel} MPH avg`:'No data'}</div>${s.note?`<div class="sh-note">"${s.note}"</div>`:''}</div>`;}).join('')}
        </div>`:''}
      <div class="pitch-log">
        <div class="pl-header"><span class="pl-num">#</span><span class="pl-type">TYPE</span><span class="pl-loc">ZONE</span><span class="pl-vel">VEL</span><span class="pl-result" style="text-align:right">RESULT</span></div>
        ${pitches.slice().reverse().slice(0,20).map((p,i)=>{
          const idx=pitches.length-i;
          const pt=PITCH_TYPES.find(t=>t.code===p.type)||PITCH_TYPES[0];
          const badge=p.swingMiss?'<span class="badge badge-swm">SWM</span>':p.foul?'<span class="badge badge-foul">FOUL</span>':p.isStrike?'<span class="badge badge-str">STRIKE</span>':'<span class="badge badge-bal">BALL</span>';
          return`<div class="pl-row"><span class="pl-num">${idx}</span><span class="pl-type" style="color:${pt.color}">${pt.code}</span><span class="pl-loc">Z${getZoneNum(p.x,p.y)}</span><span class="pl-vel">${p.vel||'—'}</span><span class="pl-result">${badge}</span></div>`;
        }).join('')}
      </div>
    </div>
  `;
}

        </div>
        <button class="es-expand-btn ${state.endSessionExpanded?'open':''}" onclick="toggleEndExpand()">
          <span>${state.endSessionExpanded?'Hide full stats':'Show full stats'}</span> <span>${state.endSessionExpanded?'▲':'▼'}</span>
        </button>
        <div class="es-full-stats ${state.endSessionExpanded?'open':''}">${fullStats}</div>
        <div class="es-note-label">✏️ SESSION NOTES</div>
        <textarea class="es-note-inp" id="esNoteInp" placeholder="How did it feel? Mechanics, movement, fatigue…">${state.endSessionNote}</textarea>
        <button class="es-done-btn" onclick="finalizeEndSession()">Save &amp; Start New Session</button>
      </div>
    </div>
  `;
}

// GLOBAL FUNCTIONS
window.selectPitcher=function(name){
  state.activePitcher=name||null;
  state.balls=0;state.strikes=0;state.pitches=0;
  if(name)state.pitches=getCurrentSession(name).pitches.length;
  render();
  setTimeout(()=>{const zc=document.getElementById('zoneCanvas');if(zc&&state.activePitcher)drawZoneCanvas(zc,getCurrentSession(state.activePitcher).pitches,true);},50);
};
window.selectGamePitcher=function(name){
  state.activeGamePitcher=name||null;
  state.gameBalls=0;state.gameStrikes=0;state.gameOuts=0;state.gameInning=1;
  state.gamePitches=0;state.gameStrikeouts=0;state.gameWalks=0;state.gameFPS=0;state.gameFPSAttempts=0;
  if(name){const gs=getCurrentGameSession(name);state.gamePitches=gs.pitches.length;}
  render();
  setTimeout(()=>{const zc=document.getElementById('gameZoneCanvas');if(zc&&state.activeGamePitcher)drawZoneCanvas(zc,getCurrentGameSession(state.activeGamePitcher).pitches,true);},50);
};
window.addPitcher=function(){
  const name=state.newPitcherName.trim();
  const num=document.getElementById('newPitcherNum')?.value?.trim()||'';
  if(!name)return;
  if(state.pitchers.find(p=>p.name===name)){showToast('Already exists');return;}
  state.pitchers.push({name,num});save();
  state.showAddPopup=false;state.newPitcherName='';
  showToast('Added '+name);selectPitcher(name);
};
window.quickAddPitcher=function(){
  const inp=document.getElementById('quickAdd');
  if(!inp||!inp.value.trim())return;
  const name=inp.value.trim();
  if(state.pitchers.find(p=>p.name===name)){showToast('Already exists');return;}
  state.pitchers.push({name,num:''});save();showToast('Added '+name);render();
};
window.deletePitcher=function(name){
  if(!confirm('Remove '+name+'?'))return;
  state.pitchers=state.pitchers.filter(p=>p.name!==name);
  if(state.activePitcher===name){state.activePitcher=null;state.balls=0;state.strikes=0;state.pitches=0;}
  save();render();
};
window.toggleEndExpand=function(){
  const noteEl=document.getElementById('esNoteInp');
  if(noteEl)state.endSessionNote=noteEl.value;
  state.endSessionExpanded=!state.endSessionExpanded;render();
};
window.endGameSession=function(){
  if(!state.activeGamePitcher)return;
  const gs=getCurrentGameSession(state.activeGamePitcher);
  if(!gs.pitches.length){showToast('No pitches tracked');return;}
  const fps=state.gameFPSAttempts>0?((state.gameFPS/state.gameFPSAttempts)*100).toFixed(0):'0';
  alert(`Game Summary — ${state.activeGamePitcher}\n\nPitches: ${state.gamePitches}\nStrikeouts: ${state.gameStrikeouts}\nWalks: ${state.gameWalks}\nFPS%: ${fps}%\nInnings: ${state.gameInning}`);
  state.gameSessions[state.activeGamePitcher].push({date:new Date().toLocaleDateString(),pitches:[],note:''});
  state.gameBalls=0;state.gameStrikes=0;state.gameOuts=0;state.gameInning=1;
  state.gamePitches=0;state.gameStrikeouts=0;state.gameWalks=0;state.gameFPS=0;state.gameFPSAttempts=0;
  save();render();
};
window.undoGamePitch=function(){
  if(!state.activeGamePitcher)return;
  const gs=getCurrentGameSession(state.activeGamePitcher);
  if(!gs.pitches.length)return;
  const last=gs.pitches.pop();
  if(last.isStrike&&!last.foul)state.gameStrikes=Math.max(0,state.gameStrikes-1);
  else if(!last.isStrike&&!last.foul)state.gameBalls=Math.max(0,state.gameBalls-1);
  state.gamePitches=Math.max(0,state.gamePitches-1);
  save();showToast('Pitch removed');render();
  setTimeout(()=>{const zc=document.getElementById('gameZoneCanvas');if(zc)drawZoneCanvas(zc,getCurrentGameSession(state.activeGamePitcher).pitches,true);},50);
};
window.clearGame=function(){
  if(!state.activeGamePitcher)return;
  if(!confirm('Clear game session?'))return;
  const gs=getGameSession(state.activeGamePitcher);
  if(gs.length)gs[gs.length-1].pitches=[];
  state.gameBalls=0;state.gameStrikes=0;state.gameOuts=0;state.gameInning=1;
  state.gamePitches=0;state.gameStrikeouts=0;state.gameWalks=0;state.gameFPS=0;state.gameFPSAttempts=0;
  save();showToast('Cleared');render();
  setTimeout(()=>{const zc=document.getElementById('gameZoneCanvas');if(zc)drawZoneCanvas(zc,[],false);},50);
};
window.confirmOutcome=confirmOutcome;
window.confirmGameOutcome=confirmGameOutcome;
window.undoPitch=undoPitch;
window.clearPitches=clearPitches;
window.endSession=endSession;
window.finalizeEndSession=finalizeEndSession;
window.exportCSV=exportCSV;
window.sendAIMessage=sendAIMessage;

function attachEvents(){
  const zc=document.getElementById('zoneCanvas');
  if(zc){
    zc.addEventListener('click',e=>handleZoneClick(e,false));
    zc.addEventListener('touchstart',e=>{e.preventDefault();handleZoneClick(e,false);},{passive:false});
  }
  const gz=document.getElementById('gameZoneCanvas');
  if(gz){
    gz.addEventListener('click',e=>handleZoneClick(e,true));
    gz.addEventListener('touchstart',e=>{e.preventDefault();handleZoneClick(e,true);},{passive:false});
  }
  const vel=document.getElementById('velInp');
  if(vel)vel.addEventListener('change',()=>{state.velocity=vel.value;});
  const gvel=document.getElementById('gameVelInp');
  if(gvel)gvel.addEventListener('change',()=>{state.velocity=gvel.value;});
}

render();
</script>
</body>
</html>
