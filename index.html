const PT=[{code:'FB',name:'4-Seam',color:'#FF4D4D'},{code:'SI',name:'Sinker',color:'#FFB347'},{code:'CU',name:'Curveball',color:'#7EB5FF'},{code:'CH',name:'Changeup',color:'#98FF98'},{code:'SL',name:'Slider',color:'#DA70D6'},{code:'SP',name:'Splitter',color:'#F0E68C'},{code:'KN',name:'Knuckle',color:'#C0C0C0'},{code:'?',name:'Unknown',color:'#94A3B8'}];

const AC=[
{n:'Foam Roll — Lats & Upper Back',s:'60 sec each side',i:'\\ud83e\\uddca',d:'Lie on your side with the foam roller under your armpit and lat. Roll slowly from armpit to mid-back, pausing on tight spots 20-30 seconds. Then move to upper thoracic spine and breathe into each segment. Releases the lat — largest deceleration muscle — and opens the thoracic spine for better arm path. Do this FIRST before all other arm care.',u:'https://www.youtube.com/results?search_query=foam+roll+lats+pitcher'},
{n:'Foam Roll — Quads & Hip Flexors',s:'90 sec each leg',i:'\\ud83e\\uddb5',d:'Face down, roller under one quad. Roll slowly from hip to just above knee. Angle slightly inward to hit the rectus femoris (hip flexor portion of the quad). Then shift to the TFL just below the hip. Tight quads pull the pelvis into anterior tilt — compresses the low back and limits hip extension during push-off, a primary velocity killer.',u:'https://www.youtube.com/results?search_query=quad+foam+roll+hip+flexor+pitcher'},
{n:'Foam Roll — Glutes & Piriformis',s:'90 sec each side',i:'\\ud83e\\udd9a',d:'Sit on the roller, shift weight to one glute, cross same ankle over opposite knee (figure-4 position). Roll through the glute and piriformis finding tight spots. The piriformis and deep hip rotators are chronically tight in pitchers and directly limit hip internal rotation — the primary torque-generating movement in pitching.',u:'https://www.youtube.com/results?search_query=foam+roll+glutes+piriformis+pitcher'},
{n:'Foam Roll — Thoracic Spine',s:'2 min total',i:'\\ud83d\\udd04',d:'Sit on floor, roller at mid-back, hands behind head. Extend over the roller segment by segment from T6 to T12. Pause and breathe into each segment. Thoracic restriction is the single biggest mechanical limiter for youth pitchers — it forces shoulder compensation, kills arm path efficiency, and is a primary cause of youth elbow and shoulder injuries.',u:'https://www.youtube.com/results?search_query=thoracic+spine+foam+roll+baseball+pitcher'},
{n:'Lacrosse Ball — Posterior Shoulder',s:'90 sec each side',i:'\\u26be',d:'Place lacrosse ball between your throwing shoulder and a wall. Lean in and find the meaty posterior deltoid and infraspinatus. Make small circles, then slowly move the arm in different directions while maintaining pressure. Breaks up adhesions that accumulate after every throwing session. Critical for pitchers who experience posterior shoulder tightness.',u:'https://www.youtube.com/results?search_query=lacrosse+ball+posterior+shoulder+pitcher'},
{n:'Band Pull-Aparts',s:'3 x 20 reps',i:'\\u2194\\ufe0f',d:'Hold a light band in front at shoulder height palms down. Pull apart until band touches chest squeezing shoulder blades together. Hold 1 sec. Return under control. Trains rear delt and lower trap — most responsible for scapular stability during the arm path. Do every single day you throw and every rest day. This is non-negotiable.',u:'https://www.youtube.com/results?search_query=band+pull+aparts+pitcher+arm+care'},
{n:'External Rotation (ER) — Band',s:'3 x 15 each arm',i:'\\ud83d\\udd01',d:'Anchor band at elbow height. Stand sideways, elbow bent 90 degrees pinned at your side. Rotate forearm outward against resistance. Pause at end range 1 second. Return slowly. This is the single most important rotator cuff exercise for pitchers. Targets infraspinatus and teres minor — the muscles that decelerate your arm after release and prevent labrum tears.',u:'https://www.youtube.com/results?search_query=external+rotation+band+pitcher'},
{n:'Internal Rotation (IR) — Band',s:'3 x 15 each arm',i:'\\ud83d\\udd04',d:'Same setup as ER but rotate forearm inward toward your body against resistance. Most programs skip IR — do not. Pitchers naturally develop dominant IR strength. Training it at equal volume to ER maintains the muscular balance that prevents anterior instability and anterior capsule breakdown. Keep elbow pinned.',u:'https://www.youtube.com/results?search_query=internal+rotation+band+pitcher'},
{n:'W-T-Y Raises',s:'2 x 12 each position',i:'\\u2708\\ufe0f',d:'Stand bent forward 45 degrees or lie face down on bench. Form W: elbows bent 90, squeeze shoulder blades, hold 2 sec. Form T: arms straight out to sides thumbs up, hold 2 sec. Form Y: arms diagonal overhead thumbs up, hold 2 sec. Use 2-3 lbs max or bodyweight only. Directly activates lower and middle trapezius — essential for scapular control on every pitch.',u:'https://www.youtube.com/results?search_query=WTY+raises+pitcher+shoulder+health'},
{n:'PNF Diagonal Patterns D1 & D2',s:'3 x 12 each direction',i:'\\u2716\\ufe0f',d:'D1 pattern: Start with hand across and below opposite hip, sweep diagonally up and out to shoulder height while externally rotating (like drawing a sword from a scabbard). D2 pattern: Start below same side hip, sweep diagonally up and across to opposite shoulder. These mimic the exact neuromuscular patterns of throwing across all planes. Used by every MLB strength staff daily.',u:'https://www.youtube.com/results?search_query=PNF+diagonal+pattern+pitcher+band'},
{n:'Sleeper Stretch',s:'3 x 30 sec each side',i:'\\ud83d\\ude34',d:'Lie on your throwing side with shoulder flat on ground and arm at 90 degrees. Use your other hand to gently push your forearm toward the floor — shoulder internally rotating. Stop at mild tension. This stretches the posterior capsule which tightens from repeated throwing. A tight posterior capsule is directly linked to labrum tears. The single most important stretch for pitchers.',u:'https://www.youtube.com/results?search_query=sleeper+stretch+pitcher+posterior+capsule'},
{n:'Cross-Body Shoulder Stretch',s:'3 x 30 sec each side',i:'\\ud83e\\udd38',d:'Pull your throwing arm across your chest at shoulder height using your other arm. Keep the shoulder depressed — do not let it shrug upward. Hold at point of stretch. Stretches the posterior deltoid and capsule. Always pair with the sleeper stretch as a complete posterior shoulder recovery routine.',u:'https://www.youtube.com/results?search_query=cross+body+shoulder+stretch+pitcher'},
{n:'Forearm Flexor & Extensor Stretch',s:'3 x 30 sec each',i:'\\ud83d\\udd90\\ufe0f',d:'Extend arm forward palm up, use opposite hand to pull fingers back toward you (flexor stretch). Then rotate to palm down and pull fingers back (extensor stretch). Do both sides. Critical for pitchers who spin the ball — reduces UCL stress and forearm inflammation. Do after every single outing without exception.',u:'https://www.youtube.com/results?search_query=forearm+stretch+pitcher+elbow+UCL'},
{n:'Wrist Circles & Strengthening',s:'2 x 20 reps each',i:'\\ud83d\\udd90\\ufe0f',d:'Full wrist circles both directions 10 reps each. Flex and extend against light resistance or bodyweight 10 reps each. Add rice bucket work 2x per week for grip and wrist strength. Wrist flexibility and strength directly affect backspin rate, spin efficiency, and offspeed pitch movement.',u:'https://www.youtube.com/results?search_query=wrist+exercises+pitcher+spin+rate'},
{n:'Ice Protocol',s:'15-20 min after outings of 30+ pitches',i:'\\ud83e\\udde7',d:'After any outing of 30 or more pitches: ice the shoulder and elbow for 15 minutes, let warm 5 minutes, ice again 5 minutes if possible. Never apply ice directly to skin. Never ice before throwing — only after. Track your recovery: if soreness lasts beyond 48 hours, rest another day before your next throwing session.',u:'https://www.youtube.com/results?search_query=icing+arm+pitcher+recovery+protocol'}
];
""")

const SC={
upper:[
{n:'Dumbbell Row',s:'4 x 10 each side',i:'\\ud83d\\udcaa',d:'One hand and knee on a bench. Row the dumbbell to your hip leading with your elbow — not your hand. Pause at the top, then lower slowly over 3 seconds. The slow eccentric builds the deceleration strength that protects your shoulder during follow-through. Most important pulling movement for pitchers. Do NOT use momentum.',u:'https://www.youtube.com/results?search_query=dumbbell+row+pitcher+strength'},
{n:'Chin-Up',s:'4 x 6-8',i:'\\u2b06\\ufe0f',d:'Dead hang start, pull until chin clears the bar, lower slowly over 3 full seconds. Full dead hang every rep — no kipping. Chin-ups beat lat pulldown for sport-specificity because they require true scapular depression under load, exactly what happens during arm deceleration. Work up to sets of 10 bodyweight before adding weight.',u:'https://www.youtube.com/results?search_query=chin+ups+pitcher+lat+strength'},
{n:'Landmine Press',s:'3 x 10 each side',i:'\\ud83d\\udcd0',d:'One hand on the end of a barbell anchored in a corner. Press from shoulder height in a natural arcing motion. The angled press path mimics the pitching arm path more closely than any flat bench or overhead press. Activates serratus anterior and lower trapezius simultaneously. Critical for arm path development and long-term shoulder health.',u:'https://www.youtube.com/results?search_query=landmine+press+baseball+pitcher'},
{n:'Face Pulls',s:'4 x 15',i:'\\ud83c\\udfaf',d:'Cable or band at face height. Pull toward your forehead with elbows flaring high and wide, finishing with hands beside ears in external rotation. Combines rowing and external rotation in one movement — uniquely valuable for pitchers. Directly trains the posterior deltoid and external rotators in a functional pattern. Do these every single training session all year.',u:'https://www.youtube.com/results?search_query=face+pulls+pitcher+shoulder+health'},
{n:'Push-Up to Serratus Push',s:'3 x 12',i:'\\ud83e\\udd32',d:'Standard push-up to the top position. Then push your upper back toward the ceiling — scapular protraction — and hold 2 seconds. This activates the serratus anterior which wraps around the ribs and holds the scapula to the thorax. Weak serratus is the number one cause of shoulder winging and impingement in pitchers.',u:'https://www.youtube.com/results?search_query=serratus+push+up+anterior+pitcher'},
{n:'Rotator Cuff Circuit',s:'3 rounds, 12 reps each exercise',i:'\\ud83d\\udd04',d:'Perform in sequence with 3-5 lb dumbbells: (1) side-lying ER x 12 each, (2) prone T-raise x 12, (3) prone Y-raise x 12, (4) scaption x 12, (5) empty can x 12. Rest 60 sec between rounds. Done 3 times per week this circuit is the single greatest investment in long-term pitching arm health. Takes only 15 minutes.',u:'https://www.youtube.com/results?search_query=rotator+cuff+circuit+pitcher'},
{n:'Pallof Press',s:'3 x 12 each side',i:'\\ud83d\\udd30',d:'Cable or band anchored at chest height to your side. Hold handle at chest, press straight out and hold 2 seconds, then return. Resist the rotational pull throughout the movement. Builds the obliques and deep core that stabilize the delivery side. Pitchers must generate rotation AND resist it on the front side — this trains both.',u:'https://www.youtube.com/results?search_query=pallof+press+baseball+pitcher+core'},
{n:'TRX Row / Inverted Row',s:'3 x 12',i:'\\ud83d\\udd01',d:'Feet elevated, body in a straight line, pull chest to bar or handles squeezing shoulder blades at the top. Highly scalable by adjusting foot height. The scapular retraction and depression pattern at peak contraction directly mimics what the lower trapezius does as the arm accelerates forward on every pitch.',u:'https://www.youtube.com/results?search_query=inverted+row+pitcher+training'}
],
lower:[
{n:'Trap Bar Deadlift',s:'4 x 5-6 heavy',i:'\\u26a1',d:'Neutral grip handles, chest up, hips down, drive through the floor with maximum force. Has the highest correlation of any single exercise to pitch velocity in the research. Trains triple extension at the ankle, knee, and hip with minimal spinal loading. Work up to 1.5 to 2 times bodyweight. Form is everything — never round the lower back.',u:'https://www.youtube.com/results?search_query=trap+bar+deadlift+baseball+velocity'},
{n:'Romanian Deadlift',s:'4 x 8',i:'\\ud83c\\udfd7\\ufe0f',d:'Hip hinge with soft knees, push hips back, lower bar along your legs until you feel a deep hamstring stretch, then drive hips forward to return. The eccentric phase — lowering — is as important as the lift. Control it over 3 seconds. Builds the posterior chain that generates the initial drive force in the pitching motion.',u:'https://www.youtube.com/results?search_query=romanian+deadlift+pitcher+hamstrings'},
{n:'Bulgarian Split Squat',s:'3 x 10 each leg',i:'\\ud83e\\uddb5',d:'Rear foot elevated on a bench, step forward so your front knee tracks over mid-foot. Lower until front thigh is parallel to the ground. Drive through the heel of the front foot to return. Trains both the drive leg eccentrically and the landing leg for stability simultaneously. Single-leg strength is far more specific to pitching than bilateral squats.',u:'https://www.youtube.com/results?search_query=bulgarian+split+squat+pitcher'},
{n:'Hip Thrust',s:'4 x 12',i:'\\ud83c\udfa2',d:'Shoulders on bench, loaded bar across hips with pad. Drive hips up until your body forms a straight line, squeeze glutes hard at the top and hold 1 second. The glutes are the primary power source in pitching — they extend the hip during push-off and stabilize the pelvis at landing. Most youth pitchers have chronically underactivated glutes.',u:'https://www.youtube.com/results?search_query=hip+thrust+pitcher+glutes+velocity'},
{n:'Lateral Band Walk',s:'3 x 20 each direction',i:'\\u2194\\ufe0f',d:'Band above knees, quarter-squat position, step laterally maintaining band tension, keep toes forward throughout. Activates the glute medius responsible for hip abduction and pelvic stability on the landing leg. When the glute med is weak the pelvis drops at landing which kills velocity and significantly increases elbow valgus stress.',u:'https://www.youtube.com/results?search_query=lateral+band+walk+pitcher+hip+stability'},
{n:'Single-Leg Romanian Deadlift',s:'3 x 8 each leg',i:'\\u2696\\ufe0f',d:'Stand on one leg, hinge forward pushing hips back, opposite leg extends behind for balance. Lower until you feel a strong hamstring stretch then return. The balance and proprioceptive demand is as important as the strength — trains the same neuromuscular control required to land and brace on the front leg during delivery.',u:'https://www.youtube.com/results?search_query=single+leg+rdl+pitcher+landing+leg'},
{n:'Goblet Squat',s:'3 x 12',i:'\\ud83c\\udfd7\\ufe0f',d:'Hold a kettlebell or dumbbell at your chest, feet shoulder width, sit between your legs into a deep squat then drive up. The goblet position naturally creates an upright torso and hip external rotation. For pitchers learning to properly load the hips in the wind-up, this squat pattern directly transfers to hip loading mechanics.',u:'https://www.youtube.com/results?search_query=goblet+squat+pitcher+hip+loading'}
],
speed:[
{n:'Med Ball Rotational Throw — Wall',s:'4 x 6 each side',i:'\\ud83d\\udca5',d:'Stand 3 feet from a solid wall perpendicular to it. Load into the hip away from the wall, then violently rotate and throw the med ball into the wall. Catch and reload immediately. Use an 8-12 lb ball. This is the single best power transfer exercise for pitchers — it trains the exact kinetic chain sequence of throwing at high velocity. Maximum effort every rep.',u:'https://www.youtube.com/results?search_query=med+ball+rotational+throw+pitcher+wall'},
{n:'Med Ball Overhead Slam',s:'4 x 6',i:'\\u2b07\\ufe0f',d:'Stand with a 10-15 lb ball overhead. Aggressively slam it into the floor directly in front of you. Catch and repeat. Trains the lat and core in a high-velocity eccentric-concentric pattern identical to the arm deceleration and re-acceleration cycle. Also conditions the abdominals to brace under ballistic loading.',u:'https://www.youtube.com/results?search_query=med+ball+overhead+slam+pitcher+core'},
{n:'Box Jump',s:'4 x 5',i:'\\u2b06\\ufe0f',d:'Stand facing a 20-24 inch box. Dip, swing arms explosively, jump and land softly with bent knees absorbing the impact. Always step down — never jump down. Trains maximum rate of force development in the lower body. Perform BEFORE lifting, never when fatigued. Explosive vertical power predicts fastball velocity better than most other physical assessments.',u:'https://www.youtube.com/results?search_query=box+jump+pitcher+explosiveness+velocity'},
{n:'Broad Jump',s:'4 x 5',i:'\\u2197\\ufe0f',d:'Squat down, load the hips, swing arms aggressively, jump as far forward as possible, land on two feet absorbing the impact. Horizontal power is more specific to pitching than vertical power because the push-off phase is primarily horizontal. Track your distance every session — as it improves velocity typically follows within 4-6 weeks.',u:'https://www.youtube.com/results?search_query=broad+jump+pitcher+horizontal+power+velocity'},
{n:'Sprint Acceleration',s:'8 x 20 yards, full rest between',i:'\\ud83c\\udfc3',d:'From a dead stop, sprint 20 yards at absolute maximum effort. Take 2 full minutes of rest between every rep. Pitchers with faster sprint times consistently have higher velocities — this is well established in baseball research. Sprint training recruits fast-twitch muscle fibers throughout the lower body that are directly used in the pitching motion.',u:'https://www.youtube.com/results?search_query=sprint+training+pitcher+velocity+fast+twitch'},
{n:'Lateral Bound',s:'3 x 8 each direction',i:'\\u2194\\ufe0f',d:'Stand on one foot, push explosively to the side, land on the opposite foot and stick the landing for 1 full second before bounding back. The stick-landing trains the frontal plane stability required on the landing leg. Progress to consecutive bounds once you can stick each one cleanly. Use a mirror to check that your landing knee stays aligned over your foot.',u:'https://www.youtube.com/results?search_query=lateral+bound+pitcher+frontal+plane'},
{n:'Kettlebell Swing',s:'4 x 15',i:'\\ud83d\\udd14',d:'Feet shoulder width, hinge at hips, swing bell back between legs then snap hips forward powerfully. The swing is driven entirely by the hips — not the arms. The hip hinge and hip snap pattern is biomechanically similar to hip extension during pitch delivery. Builds glutes, hamstrings, and core simultaneously under ballistic loading.',u:'https://www.youtube.com/results?search_query=kettlebell+swing+pitcher+power+hip+snap'}
],
band:[
{n:'Full Daily Arm Care Circuit',s:'Every day — 15 reps each exercise',i:'\\ud83d\\udd04',d:'Complete every day you throw and every rest day. Takes 8-10 minutes: (1) Pull-aparts x15, (2) External rotation x15 each, (3) Internal rotation x15 each, (4) W raise x12, (5) T raise x12, (6) Y raise x12, (7) D1 diagonal x12 each, (8) D2 diagonal x12 each, (9) Scapular retraction and depression x15. Missing even 2 days per week significantly increases injury risk over a season.',u:'https://www.youtube.com/results?search_query=pitcher+band+arm+care+circuit+daily'},
{n:'External Rotation (ER)',s:'3 x 15 each arm',i:'\\ud83d\\udd01',d:'Elbow bent 90 degrees pinned at your side, rotate forearm away from body against band resistance. Pause at end range. Return slowly. Targets the infraspinatus and teres minor — the primary decelerators of the throwing arm. Imbalance between ER and IR strength is the leading predictor of throwing arm injuries in youth and high school pitchers.',u:'https://www.youtube.com/results?search_query=external+rotation+band+pitcher+infraspinatus'},
{n:'Internal Rotation (IR)',s:'3 x 15 each arm',i:'\\ud83d\\udd04',d:'Same setup as ER but rotate forearm toward your body. Do at exactly equal volume to ER. Pitchers naturally develop dominant IR strength in the throwing arm. Training it maintains the muscular balance that prevents anterior instability and anterior capsule breakdown. Most arm care programs neglect this. Do not.',u:'https://www.youtube.com/results?search_query=internal+rotation+band+pitcher'},
{n:'Scapular Retraction & Depression',s:'3 x 15',i:'\\u2b07\\ufe0f',d:'Band anchored in front at chest height. Pull elbows back AND downward feeling your shoulder blades squeeze together AND slide down toward your back pockets. Trains the lower trapezius — often the weakest muscle in youth pitchers. Lower trap weakness causes the shoulder to elevate during the arm path which creates impingement and limits velocity.',u:'https://www.youtube.com/results?search_query=scapular+retraction+depression+lower+trap+pitcher'},
{n:'PNF Diagonal Patterns D1 & D2',s:'3 x 12 each pattern each side',i:'\\u2716\\ufe0f',d:'D1: Start hand across and below opposite hip, sweep diagonally up and out to shoulder while externally rotating — like drawing a sword from a scabbard. D2: Start below same side hip, sweep diagonally up and across to opposite shoulder. These PNF patterns train the neuromuscular coordination of the entire throwing complex across all movement planes simultaneously.',u:'https://www.youtube.com/results?search_query=PNF+D1+D2+diagonal+pitcher+band'},
{n:'Hip Flexor Band March',s:'3 x 20 steps each direction',i:'\\ud83e\\uddb5',d:'Band around ankles. Stand tall and march in place driving high knees against resistance. Then march forward and backward. Builds hip flexor and abductor strength for the leg lift phase and stride control. Use before every bullpen as a lower half activation drill. Takes 3 minutes.',u:'https://www.youtube.com/results?search_query=hip+flexor+band+march+pitcher'},
{n:'Monster Walks',s:'3 x 20 each direction',i:'\\ud83d\\udc7e',d:'Band above knees, maintain a quarter-squat position, walk forward and backward then laterally. Keep knees actively pushed out against the band throughout. Pre-activates the glute medius before every bullpen or game. This 3-minute exercise dramatically improves lower half mechanics when done consistently.',u:'https://www.youtube.com/results?search_query=monster+walks+band+pitcher+glute+med'}
],
mobility:[
{n:'Foam Roll Full Body Protocol',s:'8-10 min total',i:'\\ud83d\\udd04',d:'Complete in this order every session: (1) Calves 60 sec each — roll from ankle to knee, (2) Hamstrings 60 sec each, (3) Quads 90 sec each — face down, from hip to knee, angle inward for rectus femoris, (4) IT band 60 sec each — side lying, (5) Glutes and piriformis 60 sec each in figure-4 position, (6) Thoracic spine 2 min — extend over roller segment by segment, (7) Lats 60 sec each. Pause on tight spots 20-30 seconds. This is therapeutic treatment, not a warm-up formality.',u:'https://www.youtube.com/results?search_query=foam+rolling+full+body+protocol+baseball'},
{n:'Quad Roll & Hip Flexor Release',s:'90 sec each leg',i:'\\ud83e\\uddb5',d:'Face down, roller under one quad. Slowly work from just above the knee to the hip crease. Angle slightly inward to target the rectus femoris which is also a hip flexor. Then shift to the TFL just below the hip bone. Tight quads pull the pelvis into anterior tilt — this compresses the lumbar spine and limits hip extension during push-off, costing velocity on every pitch.',u:'https://www.youtube.com/results?search_query=quad+roll+hip+flexor+release+pitcher'},
{n:'Glute & Piriformis — Lacrosse Ball',s:'90 sec each side',i:'\\ud83e\\udd4a',d:'Sit on a lacrosse ball placed just outside your sitting bone. Cross the same ankle over the opposite knee in a figure-4 position to increase the stretch. Rotate slightly to find the tightest spots and hold. The piriformis and deep hip rotators are chronically tight in pitchers and contribute to hip impingement and limited hip internal rotation — a direct velocity limiter.',u:'https://www.youtube.com/results?search_query=piriformis+lacrosse+ball+pitcher'},
{n:'Hip 90/90 Stretch',s:'3 x 60 sec each side',i:'\\ud83e\\uddd8',d:'Sit with both knees at 90 degrees — front leg in front of you, back leg to the side. Work to get both sides of your pelvis flat on the floor. Lean forward over the front shin then rotate to the back shin. Pitchers need elite hip mobility in both internal and external rotation to generate lower-half torque without compensating at the spine or knee.',u:'https://www.youtube.com/results?search_query=90+90+hip+stretch+baseball+pitcher'},
{n:'Thoracic Rotation with Reach',s:'3 x 10 each side',i:'\\ud83c\\udf00',d:'Lie on your side with knees stacked at 90 degrees. Place top hand behind your head. Rotate your upper back open as far as possible reaching your elbow toward the ceiling. Let your eyes follow. Hold 2 sec at end range. The single most important mobility exercise for pitchers. Restricted thoracic rotation forces the shoulder and elbow to compensate causing the majority of overuse injuries in youth pitchers.',u:'https://www.youtube.com/results?search_query=thoracic+rotation+side+lying+pitcher'},
{n:"World's Greatest Stretch",s:'5 each side',i:'\\ud83c\\udf0d',d:"Lunge forward with your right foot. Place your right hand inside your right foot on the floor. Rotate your left arm to the ceiling and look up. Hold 2 sec. Return. Then reach your right arm to the ceiling. This single movement simultaneously addresses ankle dorsiflexion, hip flexor stretch, thoracic rotation, and shoulder mobility. It should be in every pitcher's warm-up routine every day.",u:"https://www.youtube.com/results?search_query=worlds+greatest+stretch+baseball+pitcher"},
{n:'Hip Flexor Kneeling Lunge Stretch',s:'3 x 45 sec each side',i:'\\ud83e\\udd38',d:'In a kneeling lunge position push your hips forward until you feel a deep stretch in the front hip. Posteriorly tilt your pelvis — tuck your tailbone under. Then reach the arm on the kneeling side overhead and lean slightly away. The hip flexors shorten progressively over a season of pitching. This stretch maintains the full hip extension and stride length needed for maximum velocity.',u:'https://www.youtube.com/results?search_query=hip+flexor+kneeling+stretch+pitcher'},
{n:'Ankle Dorsiflexion Mobilization',s:'2 x 15 each ankle',i:'\\ud83e\\uddb6',d:'Face a wall with your foot 4 inches away. Drive your knee forward over your foot keeping your heel completely flat on the floor. Gradually increase range over multiple sets. Landing leg ankle dorsiflexion directly determines landing leg bracing efficiency. Limited ankle mobility forces the knee to internally rotate at landing which stresses the MCL and limits force absorption.',u:'https://www.youtube.com/results?search_query=ankle+dorsiflexion+mobilization+landing+leg'},

{n:'Doorway Pec Minor Stretch',s:'3 x 30 sec each side',i:'\\ud83d\\udeaa',d:'Place your forearm on a doorway or wall at 90 degrees. Step through until you feel a stretch across your chest and front shoulder. The pec minor is chronically tight in pitchers and pulls the scapula into a downwardly rotated position. This restricts arm elevation and creates sub-acromial impingement. Stretch it every single day.',u:'https://www.youtube.com/results?search_query=pec+minor+stretch+pitcher+impingement'},
